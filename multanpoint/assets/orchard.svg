<svg viewBox="0 0 600 740" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Multanpoint mango orchard with the Multan shrine on the horizon at golden hour">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBEFC8"/>
      <stop offset="45%" stop-color="#F6D98A"/>
      <stop offset="100%" stop-color="#EDC25C"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF3"/>
      <stop offset="60%" stop-color="#FFE9A8" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#FFE9A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7A3A"/>
      <stop offset="100%" stop-color="#0C4A22"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FA85F"/>
      <stop offset="100%" stop-color="#0C4A22"/>
    </linearGradient>
    <linearGradient id="shrine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C58A3C"/>
      <stop offset="100%" stop-color="#9A6B2E"/>
    </linearGradient>
  </defs>

  <rect width="600" height="740" fill="url(#sky)"/>
  <circle cx="300" cy="250" r="220" fill="url(#sun)"/>
  <circle cx="300" cy="250" r="64" fill="#FFFBEC" opacity=".9"/>

  <!-- distant Multan shrine silhouette on the horizon -->
  <g fill="url(#shrine)" opacity=".55" transform="translate(404 360)">
    <rect x="-26" y="40" width="52" height="74"/>
    <path d="M-30 40 L0 -2 L30 40 Z"/>
    <path d="M0 -2 L0 -22" stroke="#9A6B2E" stroke-width="3"/>
    <circle cx="0" cy="-26" r="5"/>
    <rect x="-40" y="78" width="14" height="36"/>
    <rect x="26" y="78" width="14" height="36"/>
  </g>

  <!-- distant hills -->
  <path d="M0 470 Q150 420 300 460 T600 450 L600 740 L0 740 Z" fill="#7FB257" opacity=".5"/>

  <!-- ground -->
  <path d="M0 540 Q300 500 600 540 L600 740 L0 740 Z" fill="url(#ground)"/>

  <!-- orchard rows -->
  <g opacity=".35" fill="#06320F">
    <path d="M300 560 L120 740 L160 740 L300 580 Z"/>
    <path d="M300 560 L480 740 L440 740 L300 580 Z"/>
    <path d="M300 560 L300 740 L320 740 L320 560 Z"/>
  </g>

  <!-- mango trees -->
  <g>
    <rect x="120" y="470" width="14" height="80" rx="6" fill="#5b3a1f"/>
    <circle cx="127" cy="450" r="58" fill="url(#canopy)"/>
    <circle cx="92" cy="470" r="40" fill="url(#canopy)"/>
    <circle cx="162" cy="470" r="42" fill="url(#canopy)"/>
    <circle cx="110" cy="448" r="6" fill="#F7B733"/>
    <circle cx="148" cy="468" r="6" fill="#FF9A23"/>
    <circle cx="130" cy="480" r="5" fill="#F7B733"/>
  </g>
  <g>
    <rect x="455" y="455" width="16" height="95" rx="6" fill="#5b3a1f"/>
    <circle cx="463" cy="430" r="66" fill="url(#canopy)"/>
    <circle cx="420" cy="455" r="46" fill="url(#canopy)"/>
    <circle cx="508" cy="455" r="46" fill="url(#canopy)"/>
    <circle cx="445" cy="428" r="7" fill="#F7B733"/>
    <circle cx="488" cy="450" r="6" fill="#FF9A23"/>
    <circle cx="470" cy="465" r="6" fill="#F7B733"/>
  </g>

  <!-- foreground crate of mangoes -->
  <g transform="translate(250 612)">
    <rect x="0" y="40" width="120" height="60" rx="8" fill="#8a5f33"/>
    <rect x="0" y="40" width="120" height="14" rx="6" fill="#a0723f"/>
    <circle cx="22" cy="44" r="18" fill="#F7B733"/>
    <circle cx="58" cy="40" r="19" fill="#FF9A23"/>
    <circle cx="96" cy="44" r="18" fill="#FFC847"/>
    <circle cx="40" cy="58" r="17" fill="#FF9A23"/>
    <circle cx="78" cy="58" r="17" fill="#F7B733"/>
  </g>

  <!-- light rays -->
  <g opacity=".18" fill="#FFFDF3">
    <path d="M300 250 L120 30 L180 30 Z"/>
    <path d="M300 250 L300 0 L360 0 Z"/>
    <path d="M300 250 L520 40 L470 30 Z"/>
  </g>
</svg>
